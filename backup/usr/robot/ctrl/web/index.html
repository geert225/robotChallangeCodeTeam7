<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robot Control</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 12px; }
  h2   { margin: 0 0 10px; }

  #modebadge {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-weight: bold; font-size: 1.1em; margin-right: 10px;
  }
  .badge-manual { background: #0f3460; color: #e94560; }
  .badge-auto   { background: #0f5c2e; color: #4ade80; }

  button {
    padding: 8px 16px; margin: 4px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 0.95em;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-switch         { background: #e94560; color: #fff; }
  .btn-switch.auto    { background: #4ade80; color: #111; }
  .btn-drive          { background: #0f3460; color: #eee; font-size: 1.3em; width: 60px; height: 54px; }
  .btn-gripper        { background: #2d2d54; color: #eee; }
  .btn-auto-trigger   { background: #f59e0b; color: #111; font-weight: bold; }

  #controls    { margin: 10px 0; }
  #drive-grid  {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 4px;
    margin: 8px 0;
  }

  #gripper-panel { margin: 10px 0; }
  #status        { font-size: 0.85em; color: #aaa; margin: 6px 0; }
  #cam           { display: block; margin-top: 10px; border: 2px solid #444; border-radius: 6px; }

  .hidden   { display: none !important; }
  #auto-info { color: #4ade80; font-style: italic; margin: 6px 0; }

  /* Ultrasoon display */
  #ultra-panel {
    display: flex; gap: 12px; margin: 10px 0; flex-wrap: wrap;
  }
  .ultra-sensor {
    background: #0f1f3d; border-radius: 8px; padding: 8px 14px;
    min-width: 120px; text-align: center;
  }
  .ultra-label { font-size: 0.75em; color: #aaa; margin-bottom: 4px; }
  .ultra-val   { font-size: 1.6em; font-weight: bold; }
  .ultra-unit  { font-size: 0.75em; color: #aaa; }
  .dist-safe   { color: #4ade80; }   /* groen  > 30 cm  */
  .dist-warn   { color: #f59e0b; }   /* oranje 15–30 cm */
  .dist-danger { color: #ef4444; }   /* rood   < 15 cm  */
  .dist-nodata { color: #666;    }   /* grijs  = 0      */

  /* Positie / mini-kaart */
  #pose-panel {
    margin: 10px 0; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start;
  }
  #pose-coords {
    background: #0f1f3d; border-radius: 8px; padding: 8px 14px; min-width: 150px;
  }
  #pose-coords .lbl { font-size: 0.72em; color: #aaa; margin-bottom: 2px; }
  #pose-coords .val { font-size: 1.3em; font-weight: bold; color: #67e8f9; }
  #pose-coords .val span { font-size: 0.7em; color: #aaa; }

  #map-wrap {
    position: relative;
  }
  #map-canvas {
    border: 2px solid #334; border-radius: 8px; display: block;
    background: #0a0a1a; cursor: crosshair;
  }
  #map-btns { margin-top: 4px; }
  #map-btns button {
    background: #1e3a5f; color: #ccc; font-size: 0.8em;
    padding: 4px 10px; margin: 2px;
  }
  #map-btns button:hover { background: #2a5282; }
</style>
</head>
<body>

<h2>
  <span id="modebadge" class="badge-manual">MANUAL</span>
  Robot Control
</h2>

<div id="status">Verbinden...</div>

<!-- Modus wisselen -->
<div>
  <button id="btn-switch" class="btn-switch" onclick="switchMode()">Start AUTO</button>
</div>

<!-- AUTO info -->
<div id="auto-info" class="hidden">Robot rijdt autonoom op vision.</div>

<!-- MANUAL rijbediening -->
<div id="controls">
  <div><strong>Rijden</strong> <small>(pijltjes of knoppen)</small></div>
  <div id="drive-grid">
    <div></div>
    <button class="btn-drive"
      onmousedown="press('up')"        onmouseup="release()"
      ontouchstart="pressTouch('up',event)" ontouchend="release()" ontouchcancel="release()">&#8593;</button>
    <div></div>

    <button class="btn-drive"
      onmousedown="press('left')"      onmouseup="release()"
      ontouchstart="pressTouch('left',event)" ontouchend="release()" ontouchcancel="release()">&#8592;</button>
    <button class="btn-drive"
      onmousedown="press('stop')"      onmouseup="release()"
      ontouchstart="pressTouch('stop',event)" ontouchend="release()" ontouchcancel="release()">&#9632;</button>
    <button class="btn-drive"
      onmousedown="press('right')"     onmouseup="release()"
      ontouchstart="pressTouch('right',event)" ontouchend="release()" ontouchcancel="release()">&#8594;</button>

    <button class="btn-drive"
      onmousedown="press('rot_left')"  onmouseup="release()"
      ontouchstart="pressTouch('rot_left',event)" ontouchend="release()" ontouchcancel="release()">&#8634;</button>
    <button class="btn-drive"
      onmousedown="press('down')"      onmouseup="release()"
      ontouchstart="pressTouch('down',event)" ontouchend="release()" ontouchcancel="release()">&#8595;</button>
    <button class="btn-drive"
      onmousedown="press('rot_right')" onmouseup="release()"
      ontouchstart="pressTouch('rot_right',event)" ontouchend="release()" ontouchcancel="release()">&#8635;</button>
  </div>
</div>

<!-- MANUAL gripper bediening -->
<div id="gripper-panel">
  <div><strong>Gripper</strong></div>
  <button class="btn-gripper"
    onmousedown="send('gripper_jog:30')"               onmouseup="send('gripper_stop')"
    ontouchstart="sendTouch('gripper_jog:30', event)"  ontouchend="send('gripper_stop')" ontouchcancel="send('gripper_stop')">
    &#9650; Gripper JOG
  </button>
  <button class="btn-auto-trigger" onclick="send('gripper_auto')">
    &#9654; Gripper AUTO
  </button>
</div>

<!-- Ultrasoon display (altijd zichtbaar) -->
<div id="ultra-panel">
  <div class="ultra-sensor">
    <div class="ultra-label">&#8594; Voor rechts (S1)</div>
    <div class="ultra-val dist-nodata" id="ultra-d1">--</div>
    <div class="ultra-unit">cm</div>
  </div>
  <div class="ultra-sensor">
    <div class="ultra-label">&#8592; Voor links (S2)</div>
    <div class="ultra-val dist-nodata" id="ultra-d2">--</div>
    <div class="ultra-unit">cm</div>
  </div>
</div>

<!-- Positie & mini-kaart -->
<div id="pose-panel">
  <div id="pose-coords">
    <div class="lbl">X (vooruit)</div>
    <div class="val" id="pose-x">--<span> m</span></div>
    <div class="lbl">Y (zijwaarts)</div>
    <div class="val" id="pose-y">--<span> m</span></div>
    <div class="lbl">Heading</div>
    <div class="val" id="pose-th">--<span> °</span></div>
  </div>
  <div id="map-wrap">
    <canvas id="map-canvas" width="260" height="260"></canvas>
    <div id="map-btns">
      <button onclick="resetPose()">Reset nulpunt</button>
      <button onclick="mapZoomIn()">+</button>
      <button onclick="mapZoomOut()">-</button>
    </div>
  </div>
</div>

<!-- Camera -->
<img id="cam" width="320" alt="camera">

<script>
let ws        = new WebSocket("ws://" + location.host + "/ws");
let camWs     = new WebSocket("ws://" + location.host + "/cam");
let mode      = "manual";
let pressTimer = null;

camWs.binaryType = "blob";
camWs.onmessage  = (e) => {
  let url = URL.createObjectURL(e.data);
  document.getElementById("cam").src = url;
};

ws.onopen    = () => setStatus("Verbonden");
ws.onclose   = () => setStatus("Verbinding verbroken");
ws.onerror   = () => setStatus("Verbindingsfout");
ws.onmessage = (e) => {
  if (e.data.startsWith("mode:")) {
    applyMode(e.data.split(":")[1]);
  } else if (e.data.startsWith("ultra:")) {
    const parts = e.data.slice(6).split(",");
    updateUltra("ultra-d1", parseInt(parts[0]));
    updateUltra("ultra-d2", parseInt(parts[1]));
  } else if (e.data.startsWith("pose:")) {
    const p = e.data.slice(5).split(",").map(Number);
    updatePose(p[0], p[1], p[2]);
  }
};

function updateUltra(id, cm) {
  const el = document.getElementById(id);
  if (cm === 0) {
    el.textContent = "--";
    el.className   = "ultra-val dist-nodata";
  } else {
    el.textContent = cm;
    if      (cm < 15) el.className = "ultra-val dist-danger";
    else if (cm < 30) el.className = "ultra-val dist-warn";
    else              el.className = "ultra-val dist-safe";
  }
}

function send(cmd) {
  if (ws.readyState === WebSocket.OPEN) ws.send(cmd);
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// Houd rijknop ingedrukt → blijf commando sturen
function press(cmd) {
  if (mode !== "manual") return;
  if (pressTimer !== null) return;   // voorkom dubbele timer (mouse + touch)
  send(cmd);
  pressTimer = setInterval(() => send(cmd), 80);
}
function pressTouch(cmd, e) {
  e.preventDefault();                // blokkeert navolgende mousedown
  press(cmd);
}
function sendTouch(cmd, e) {
  e.preventDefault();                // blokkeert navolgende mousedown
  send(cmd);
}
function release() {
  if (pressTimer !== null) {
    clearInterval(pressTimer);
    pressTimer = null;
  }
  send("stop");
}

function switchMode() {
  send(mode === "manual" ? "set_mode:auto" : "set_mode:manual");
}

function applyMode(newMode) {
  mode = newMode;
  const badge    = document.getElementById("modebadge");
  const btn      = document.getElementById("btn-switch");
  const ctrl     = document.getElementById("controls");
  const gripper  = document.getElementById("gripper-panel");
  const autoInfo = document.getElementById("auto-info");

  if (mode === "auto") {
    badge.textContent = "AUTO";
    badge.className   = "badge-auto";
    btn.textContent   = "Stop AUTO";
    btn.className     = "btn-switch auto";
    ctrl.classList.add("hidden");
    gripper.classList.add("hidden");
    autoInfo.classList.remove("hidden");
  } else {
    badge.textContent = "MANUAL";
    badge.className   = "badge-manual";
    btn.textContent   = "Start AUTO";
    btn.className     = "btn-switch";
    ctrl.classList.remove("hidden");
    gripper.classList.remove("hidden");
    autoInfo.classList.add("hidden");
  }
}

// ── Pose & mini-kaart ──────────────────────────────────────────────────────

// poseOffset: wordt afgetrokken van server-pose zodat "reset" werkt
let poseOffset = { x: 0, y: 0, th: 0 };
let currentRaw = { x: 0, y: 0, th: 0 };

// Pad: array van {x,y} punten in gecorrigeerde coördinaten (m)
let trail = [];
const TRAIL_MAX = 2000;

// Kaart schaal & midden
let mapScale  = 60;   // pixels per meter
const CANVAS_W = 260;
const CANVAS_H = 260;

const mapCanvas = document.getElementById("map-canvas");
const mapCtx    = mapCanvas.getContext("2d");

function updatePose(rx, ry, rth) {
  currentRaw = { x: rx, y: ry, th: rth };
  const x  = rx  - poseOffset.x;
  const y  = ry  - poseOffset.y;
  const th = rth - poseOffset.th;

  // Coördinaten-display
  document.getElementById("pose-x").childNodes[0].textContent = x.toFixed(3);
  document.getElementById("pose-y").childNodes[0].textContent = y.toFixed(3);
  document.getElementById("pose-th").childNodes[0].textContent =
    (th * 180 / Math.PI).toFixed(1);

  // Trail bijhouden
  trail.push({ x, y });
  if (trail.length > TRAIL_MAX) trail.shift();

  drawMap(x, y, th);
}

function drawMap(x, y, th) {
  const W = CANVAS_W, H = CANVAS_H;
  const cx = W / 2, cy = H / 2;

  mapCtx.clearRect(0, 0, W, H);

  // Raster (1 m rijen)
  mapCtx.strokeStyle = "#1e2a3a";
  mapCtx.lineWidth = 1;
  const step = mapScale;
  // verticaal
  for (let gx = (cx % step); gx < W; gx += step) {
    mapCtx.beginPath(); mapCtx.moveTo(gx, 0); mapCtx.lineTo(gx, H); mapCtx.stroke();
  }
  // horizontaal
  for (let gy = (cy % step); gy < H; gy += step) {
    mapCtx.beginPath(); mapCtx.moveTo(0, gy); mapCtx.lineTo(W, gy); mapCtx.stroke();
  }

  // Assen door nulpunt (gecorrigeerd nulpunt = offset)
  const ox = cx - x * mapScale;
  const oy = cy + y * mapScale;
  mapCtx.strokeStyle = "#223344";
  mapCtx.lineWidth = 1.5;
  mapCtx.beginPath(); mapCtx.moveTo(ox, 0); mapCtx.lineTo(ox, H); mapCtx.stroke();
  mapCtx.beginPath(); mapCtx.moveTo(0, oy); mapCtx.lineTo(W, oy); mapCtx.stroke();

  // Nulpunt-ster
  mapCtx.fillStyle = "#334";
  mapCtx.beginPath(); mapCtx.arc(ox, oy, 4, 0, 2 * Math.PI); mapCtx.fill();

  // Trail
  if (trail.length > 1) {
    mapCtx.beginPath();
    mapCtx.strokeStyle = "#2563eb";
    mapCtx.lineWidth = 2;
    for (let i = 0; i < trail.length; i++) {
      const px = cx + trail[i].x * mapScale;
      const py = cy - trail[i].y * mapScale;
      if (i === 0) mapCtx.moveTo(px, py);
      else         mapCtx.lineTo(px, py);
    }
    mapCtx.stroke();
  }

  // Robot positie + heading-pijl
  const rpx = cx + x * mapScale;
  const rpy = cy - y * mapScale;

  // Robot lichaam (gevulde cirkel)
  mapCtx.fillStyle = "#e94560";
  mapCtx.beginPath(); mapCtx.arc(rpx, rpy, 9, 0, 2 * Math.PI); mapCtx.fill();

  // Heading-pijl (in kaart: x=rechts, y=omhoog, theta=0 = rechtdoor = +x-richting op canvas)
  const arrowLen = 18;
  const ax = rpx + Math.cos(th) * arrowLen;
  const ay = rpy - Math.sin(th) * arrowLen;   // canvas y is omgekeerd
  mapCtx.strokeStyle = "#fff";
  mapCtx.lineWidth = 2.5;
  mapCtx.beginPath(); mapCtx.moveTo(rpx, rpy); mapCtx.lineTo(ax, ay); mapCtx.stroke();

  // Schaal-indicator
  mapCtx.fillStyle = "#556";
  mapCtx.font = "10px sans-serif";
  mapCtx.fillText(`${(1000/mapScale).toFixed(0)} cm/div`, 4, H - 4);
}

function resetPose() {
  poseOffset.x  = currentRaw.x;
  poseOffset.y  = currentRaw.y;
  poseOffset.th = currentRaw.th;
  trail = [];
  send("pose_reset");   // melding naar server (optioneel, wordt nu genegeerd)
}

function mapZoomIn()  { mapScale = Math.min(mapScale * 1.5, 500); drawMap(...lastPose()); }
function mapZoomOut() { mapScale = Math.max(mapScale / 1.5,   4); drawMap(...lastPose()); }
function lastPose() {
  const x  = currentRaw.x  - poseOffset.x;
  const y  = currentRaw.y  - poseOffset.y;
  const th = currentRaw.th - poseOffset.th;
  return [x, y, th];
}

// Initieel lege kaart tekenen
drawMap(0, 0, 0);

// ── Toetsenbord rijbesturing (MANUAL) ─────────────────────────────────────

// Toetsenbord rijbesturing (MANUAL)
let keys = new Set();
document.addEventListener("keydown", (e) => {
  if (mode !== "manual" || e.repeat) return;
  const map = {
    ArrowUp: "up", ArrowDown: "down",
    ArrowLeft: "left", ArrowRight: "right",
    "[": "rot_left", "]": "rot_right"
  };
  if (map[e.key]) { keys.add(e.key); flushKeys(); }
});
document.addEventListener("keyup", (e) => {
  keys.delete(e.key);
  flushKeys();
});
function flushKeys() {
  send("stop");
  if (keys.has("ArrowUp"))    send("up");
  if (keys.has("ArrowDown"))  send("down");
  if (keys.has("ArrowLeft"))  send("left");
  if (keys.has("ArrowRight")) send("right");
  if (keys.has("["))          send("rot_left");
  if (keys.has("]"))          send("rot_right");
}
</script>
</body>
</html>
